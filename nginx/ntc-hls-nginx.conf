server {
    listen 8080;
    server_name _;

    access_log off;
    error_log /var/log/nginx/error.log warn;

    location = /healthz {
        default_type application/json;
        return 200 '{"ok":true,"service":"ntc-hls-nginx"}';
    }

    location /listen/hls-nginx/ {
        alias /usr/share/nginx/html/hls/;
        types {
            video/mp2t ts;
            audio/aac aac;
            video/iso.segment m4s;
        }
        default_type application/octet-stream;
        add_header X-NTC-HLS-Server nginx always;
        add_header Cache-Control "public, max-age=120, s-maxage=120, stale-while-revalidate=120" always;
        add_header CDN-Cache-Control "max-age=120" always;
        add_header X-Accel-Buffering "no" always;
        try_files $uri =404;
    }

    # Compatibility for playlists generated before the nginx naming cleanup.
    location /listen/hls-edge/ {
        alias /usr/share/nginx/html/hls/;
        types {
            video/mp2t ts;
            audio/aac aac;
            video/iso.segment m4s;
        }
        default_type application/octet-stream;
        add_header X-NTC-HLS-Server nginx always;
        add_header Cache-Control "public, max-age=120, s-maxage=120, stale-while-revalidate=120" always;
        add_header CDN-Cache-Control "max-age=120" always;
        add_header X-Accel-Buffering "no" always;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
